name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Register TypeScript problem matcher
        run: echo "::add-matcher::.github/problem-matchers/tsc.json"

      - name: Lint (type-check)
        run: npm run lint

      - name: Build
        if: ${{ !cancelled() }}
        run: npm run build

      - name: Test
        if: ${{ !cancelled() }}
        run: npm test -- --reporter=default --reporter=github-actions
